services:
  scrapetuner:
    image: DasEric/ScrapeTuner:latest
    container_name: scrapetuner
    restart: unless-stopped
    ports:
      - "5004:5004"
    volumes:
      - ./config:/config
    environment:
      # Leave empty: the tuner automatically derives the host IP.
      # If using reverse proxy or multiple networks, set the LAN IP, e.g.
      # PUBLIC_BASE_URL: http://192.168.178.50:5004
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      # Optional Video Upscaling & Sharpening (High CPU!)
      TRANSCODE_UPSCALING: "false"
      TRANSCODE_RESOLUTION: "1920x1080"
      TRANSCODE_SHARPEN: "0.5"
      TRANSCODE_DENOISE: "1.0"
      # Scraper Fallback Priority List (comma-separated list of: 2ix2tv, livedetv, lolmt2, nydus, raidrush, 2ix2)
      SCRAPER_PROVIDERS: "2ix2tv,livedetv,lolmt2,2ix2"
